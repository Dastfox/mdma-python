name: Release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        # Relies on PyPI Trusted Publishing (OIDC) — no token secret needed.
        # One-time setup required on pypi.org: register a pending publisher
        # for project "python-mdma" pointing at this repo, workflow
        # "release.yml", environment "pypi".
